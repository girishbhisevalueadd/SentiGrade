<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Recent News</title>
</head>
<body>
    <h1>Recent News</h1>
    <table border="1">
        <thead>
            <tr>
                <th>Date</th>
                <th>News</th>
            </tr>
        </thead>
        <tbody>
            {% for news_item in news_data %}
                <tr>
                    <td>{{ news_item['Date'].strftime('%Y-%m-%d') }}</td>
                    <td>
                        {% if news_item['LINK'] %}
                            <a href="{{ news_item['LINK'] }}" target="_blank">{{ news_item['NEWS'] }}</a>
                        {% else %}
                            {{ news_item['NEWS'] }}
                        {% endif %}
                    </td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
