<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Arial", sans-serif;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: linear-gradient(135deg, #1e3c72, #2a5298);
      }

      .login-container {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        padding: 2rem;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        text-align: center;
        width: 350px;
      }

      .login-container h1 {
        color: #fff;
        margin-bottom: 1.5rem;
      }

      .input-group {
        margin-bottom: 1rem;
        text-align: left;
      }

      label {
        display: block;
        font-size: 14px;
        margin-bottom: 5px;
        color: #fff;
      }

      input {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        background: rgba(255, 255, 255, 0.2);
        color: #fff;
        outline: none;
      }

      input::placeholder {
        color: rgba(255, 255, 255, 0.7);
      }

      input:focus {
        background: rgba(255, 255, 255, 0.3);
      }

      .btn {
        width: 100%;
        padding: 10px;
        margin-top: 1rem;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        background: #ff6600;
        color: #fff;
        cursor: pointer;
        transition: 0.3s;
      }

      .btn:hover {
        background: #e65c00;
      }

      .error-message {
        color: #ff4c4c;
        margin-top: 1rem;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <h1>Login</h1>
      <form method="post">
        <div class="input-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Enter your username" required />
        </div>
        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" required />
        </div>
        <button type="submit" class="btn">Login</button>
      </form>
      {% if error %}
      <p class="error-message">{{ error }}</p>
      {% endif %}
    </div>
  </body>
</html>
