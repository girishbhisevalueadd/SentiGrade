<!DOCTYPE html>
<html>
<head>
    <title>{{ ticker }} Stock Chart</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        .chart-container {
            width: 100vw;
            height: 100vh;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div class="chart-container">
        <iframe src="{{ url_for('static', filename=chart_url) }}" frameborder="0"></iframe>
    </div>
</body>
</html>
